<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Примеры сайтов · A.R. Business Agency</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b14;--tx:#eef3ff;--mut:#9fb0cf;--card:#0e1524;--line:#1e2a44;--ac:#3b6dff;--ac2:#7db2ff;--e:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;-webkit-font-smoothing:antialiased;padding:22px 16px 40px;max-width:560px;margin:0 auto}
.hd{margin-bottom:18px}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ac2);font-weight:600}
h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:8px;text-wrap:balance}
.sub{color:var(--mut);font-size:15px;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.card{position:relative;display:block;text-decoration:none;color:inherit;background:var(--card);
  border:1px solid var(--line);border-radius:16px;padding:16px;overflow:hidden;
  transition:transform .35s var(--e),border-color .35s var(--e)}
.card:active{transform:scale(.98)}
.card .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:24px;
  background:radial-gradient(120% 120% at 30% 20%,color-mix(in srgb,var(--c) 55%,#0a0f1c),#0a0f1c);margin-bottom:12px}
.card h3{font-size:16px;font-weight:600}
.card p{color:var(--mut);font-size:12.5px;margin-top:3px}
.card .go{margin-top:12px;font-size:13px;font-weight:600;color:var(--ac2)}
.tag{position:absolute;top:12px;right:12px;font-size:10px;font-weight:600;letter-spacing:.04em;
  background:rgba(52,211,153,.14);color:#7ff0c0;border:1px solid rgba(52,211,153,.3);border-radius:99px;padding:3px 8px}
.full{grid-column:1 / -1}
.note{color:var(--mut);font-size:13px;margin-top:18px;text-align:center;line-height:1.5}
.cta{display:block;text-align:center;text-decoration:none;margin-top:18px;background:var(--ac);color:#fff;
  font-weight:700;font-size:16px;border-radius:14px;padding:15px;box-shadow:0 10px 30px rgba(59,109,255,.35)}
</style>
</head>
<body>
<div class="hd">
  <div class="eyebrow">Портфолио · демо</div>
  <h1>Примеры сайтов по нишам</h1>
  <p class="sub">Потыкайте живые демо. Ваш сайт соберём под ваш бренд, фото и услуги — в похожем стиле или лучше.</p>
</div>

<div class="grid" id="grid"></div>

<p class="note">Показаны обезличенные демо-шаблоны. Все проекты делаю вручную под конкретный бизнес.</p>
<a class="cta" href="../?from=demo" id="cta">✨ Хочу свой сайт — оставить заявку</a>

<script>
const tg=window.Telegram?.WebApp; try{tg?.ready();tg?.expand();}catch(e){}
const CARDS=[
 {t:'Барбершоп / бьюти',d:'Онлайн-запись, услуги, мастера',ic:'💈',c:'#e0489a',href:'beauty/',real:1},
 {t:'Магазин техники',d:'Каталог, корзина, доставка',ic:'🛍️',c:'#8b5cf6',href:'shop/',real:1},
 {t:'Транспорт / логистика',d:'Услуги перевозок, заявка',ic:'🚚',c:'#22c39a',href:'services/',real:1},
 {t:'Автосервис',d:'Ремонт, шиномонтаж, детейлинг',ic:'🔧',c:'#f5b544',href:'preview.html?cat=auto'},
 {t:'Ремонт и интерьер',d:'Ремонт под ключ, мебель',ic:'🏠',c:'#22c39a',href:'preview.html?cat=repair'},
 {t:'Кафе / доставка еды',d:'Меню, заказ онлайн',ic:'🍕',c:'#ff7043',href:'preview.html?cat=food'},
 {t:'Здоровье / клиника',d:'Запись, специалисты',ic:'🩺',c:'#2bb6c7',href:'preview.html?cat=health'},
 {t:'Услуги для дома',d:'Мастер, клининг, доставка',ic:'🧰',c:'#3b6dff',href:'preview.html?cat=services'},
];
document.getElementById('grid').innerHTML=CARDS.map(c=>`
  <a class="card" href="${c.href}" style="--c:${c.c}">
    ${c.real?'<span class="tag">реальный проект</span>':''}
    <div class="ic">${c.ic}</div>
    <h3>${c.t}</h3><p>${c.d}</p><div class="go">Смотреть демо →</div>
  </a>`).join('');
</script>
</body>
</html>
