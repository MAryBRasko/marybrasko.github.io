<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Бриф · A.R. Business Agency</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14; --card:rgba(18,27,48,.72); --tx:#eaf1ff; --mut:#93a6c9;
  --accent:#3b6dff; --accent2:#7db2ff; --cyan:#22d3ee; --ok:#34d399; --line:rgba(125,178,255,.18);
  --e:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
#bgv{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2;opacity:.55}
#bgo{position:fixed;inset:0;z-index:-1;background:
  radial-gradient(120% 80% at 50% 0%,rgba(59,109,255,.18),transparent 60%),
  linear-gradient(180deg,rgba(7,11,20,.55),rgba(7,11,20,.9))}
body{font-family:'Outfit',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--tx);
  line-height:1.5;padding:16px 16px 40px;max-width:520px;margin:0 auto;
  -webkit-font-smoothing:antialiased;min-height:100vh}
.top{margin:4px 0 16px}
.brand{font-weight:800;font-size:15px;letter-spacing:-.01em}.brand b{color:var(--accent2)}
.bar{height:6px;background:var(--card);border-radius:99px;overflow:hidden;margin-top:12px}
.bar>i{display:block;height:100%;width:16%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;transition:width .5s var(--e)}
.step{opacity:0;transform:translateY(10px);transition:.4s var(--e);display:none}
.step.on{opacity:1;transform:none;display:block;animation:in .45s var(--e)}
@keyframes in{from{opacity:0;transform:translateY(10px)}}
h2{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:18px 0 4px;text-wrap:balance}
.q-sub{color:var(--mut);font-size:14px;margin-bottom:18px}
.opts{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);
  border-radius:14px;padding:15px 16px;font-size:16px;font-weight:500;cursor:pointer;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:border-color .3s var(--e),background .3s var(--e),transform .2s var(--e)}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,var(--card))}
.opt .em{font-size:20px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--card);border:1.5px solid var(--line);border-radius:99px;padding:9px 15px;
  font-size:15px;cursor:pointer;transition:.25s var(--e)}
.chip.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 16%,var(--card));color:var(--accent2)}
input,textarea{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:14px;
  padding:14px 16px;color:var(--tx);font:inherit;font-size:16px;margin-top:10px;outline:none;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:80px;resize:vertical}
.nav{display:flex;gap:10px;margin-top:22px}
.btn{flex:1;font:inherit;font-weight:600;font-size:16px;border:none;border-radius:14px;padding:15px;
  cursor:pointer;transition:.25s var(--e)}
.btn:active{transform:scale(.98)}
.back{background:var(--card);color:var(--tx);border:1.5px solid var(--line);flex:0 0 34%}
.next{background:var(--accent);color:#fff}
.next:disabled{opacity:.4}
.done{text-align:center;padding:30px 10px}
.done .big{font-size:52px}.done h2{margin-top:10px}
.sum{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
  text-align:left;margin:16px 0;font-size:14px}
.sum div{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid var(--line)}
.sum div:last-child{border:0}.sum span{color:var(--mut)}.sum b{text-align:right}
</style>
</head>
<body>
<video id="bgv" autoplay muted loop playsinline poster="bg-poster.jpg">
  <source src="bg-loop.mp4" type="video/mp4">
</video>
<div id="bgo"></div>
<div class="top">
  <div class="brand">A.R. <b>Business Agency</b> · бриф</div>
  <div class="bar"><i id="prog"></i></div>
</div>

<div id="app"></div>

<div class="nav" id="nav">
  <button class="btn back" id="back" style="display:none">Назад</button>
  <button class="btn next" id="next" disabled>Далее</button>
</div>

<script>
const tg = window.Telegram?.WebApp; try{tg?.ready();tg?.expand();}catch(e){}
const A = {}; // ответы
const STEPS = [
  {k:'goal', t:'Что вам нужно?', s:'Выберите главное — детали уточним', type:'opts', opts:[
    ['🌐','Сайт / лендинг'],['🎨','Брендбук / фирменный стиль'],['📣','SMM / продвижение'],
    ['📦','Всё под ключ (комплекс)'],['🤔','Пока не определился']]},
  {k:'niche', t:'Ниша бизнеса?', s:'Так подберём примеры и структуру', type:'chips', opts:[
    'Бьюти','Авто','Ремонт/интерьер','Еда/кафе','Услуги','Здоровье','Магазин','Другое']},
  {k:'site', t:'Сейчас есть сайт?', s:'', type:'opts', opts:[
    ['🚫','Нет сайта'],['🕸️','Есть, но слабый/старый'],['✅','Есть, нормальный']]},
  {k:'budget', t:'Ориентир по бюджету?', s:'Поможем уложиться, есть рассрочка и бартер', type:'opts', opts:[
    ['💵','до 30 000 ₽'],['💰','30–60 000 ₽'],['💎','60–100 000 ₽'],['🏆','100 000 ₽+'],['🤝','Не определился']]},
  {k:'when', t:'Когда нужно?', s:'', type:'opts', opts:[
    ['🔥','Срочно (на этой неделе)'],['📅','2–4 недели'],['👀','Просто изучаю варианты']]},
  {k:'refs', t:'Есть примеры, которые нравятся?', s:'Скиньте ссылки на сайты/референсы — сделаем в похожем стиле или лучше. Скриншоты и фото можно прислать в чат после брифа.', type:'refs'},
  {k:'contact', t:'Как с вами связаться?', s:'Имя и телефон или @telegram', type:'form'},
];
let i = 0;
const app = document.getElementById('app'), prog = document.getElementById('prog');
const nextBtn = document.getElementById('next'), backBtn = document.getElementById('back');

function render(){
  const st = STEPS[i];
  prog.style.width = ((i+1)/(STEPS.length+1)*100)+'%';
  backBtn.style.display = i>0 ? 'block':'none';
  let h = `<div class="step on"><h2>${st.t}</h2>${st.s?`<p class="q-sub">${st.s}</p>`:''}`;
  if(st.type==='opts'){
    h+='<div class="opts">'+st.opts.map((o,x)=>
      `<div class="opt${A[st.k]===o[1]?' sel':''}" data-v="${o[1]}"><span class="em">${o[0]}</span>${o[1]}</div>`).join('')+'</div>';
  } else if(st.type==='chips'){
    h+='<div class="chips">'+st.opts.map(o=>
      `<div class="chip${A[st.k]===o?' sel':''}" data-v="${o}">${o}</div>`).join('')+'</div>';
  } else if(st.type==='refs'){
    h+=`<textarea id="f_refs" placeholder="Ссылки на сайты/примеры, которые нравятся (по одной на строку). Можно пропустить.">${A.refs||''}</textarea>`;
  } else if(st.type==='form'){
    h+=`<input id="f_name" placeholder="Имя" value="${A.name||''}">
        <input id="f_contact" placeholder="Телефон или @telegram" value="${A.contact||''}">
        <textarea id="f_note" placeholder="Пара слов о задаче (необязательно)">${A.note||''}</textarea>`;
  }
  h+='</div>';
  app.innerHTML = h;
  bind(st);
  updateNext(st);
  nextBtn.textContent = i===STEPS.length-1 ? 'Отправить заявку' : 'Далее';
}
function bind(st){
  if(st.type==='opts'||st.type==='chips'){
    app.querySelectorAll('[data-v]').forEach(el=>el.onclick=()=>{
      A[st.k]=el.dataset.v;
      app.querySelectorAll('[data-v]').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel'); updateNext(st);
    });
  } else if(st.type==='refs'){
    const el=document.getElementById('f_refs');
    el.oninput=()=>{A.refs=el.value.trim(); updateNext(st);};
  } else if(st.type==='form'){
    ['f_name','f_contact','f_note'].forEach(id=>{
      const el=document.getElementById(id);
      el.oninput=()=>{A.name=document.getElementById('f_name').value.trim();
        A.contact=document.getElementById('f_contact').value.trim();
        A.note=document.getElementById('f_note').value.trim(); updateNext(st);};
    });
  }
}
function updateNext(st){
  let ok;
  if(st.type==='form') ok = A.name && A.contact && A.contact.length>3;
  else if(st.type==='refs') ok = true;         // референсы необязательны
  else ok = !!A[st.k];
  nextBtn.disabled = !ok;
}
nextBtn.onclick=()=>{ if(nextBtn.disabled) return;
  if(i<STEPS.length-1){ i++; render(); } else finish(); };
backBtn.onclick=()=>{ if(i>0){ i--; render(); } };

function finish(){
  prog.style.width='100%';
  document.getElementById('nav').style.display='none';
  const map={goal:'Задача',niche:'Ниша',site:'Сайт сейчас',budget:'Бюджет',when:'Сроки'};
  const rows=Object.keys(map).map(k=>`<div><span>${map[k]}</span><b>${A[k]||'—'}</b></div>`).join('');
  app.innerHTML=`<div class="done"><div class="big">🎉</div>
    <h2>Заявка готова!</h2><p class="q-sub">Ростислав свяжется с вами в ближайшее время.</p>
    <div class="sum">${rows}
      ${A.refs?`<div><span>Референсы</span><b>${A.refs.split('\n')[0].slice(0,40)}…</b></div>`:''}
      <div><span>Имя</span><b>${A.name||'—'}</b></div>
      <div><span>Контакт</span><b>${A.contact||'—'}</b></div>
    </div>
    <p class="q-sub">📎 Есть скриншоты или фото примеров? Пришлите их прямо в чат — сделаем в похожем стиле или лучше.</p></div>`;
  const payload=JSON.stringify({type:'brief',...A});
  try{ tg.sendData(payload); }catch(e){ console.log('payload',payload); }
  setTimeout(()=>{try{tg.close();}catch(e){}},2500);
}
render();
</script>
</body>
</html>
