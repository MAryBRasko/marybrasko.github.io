:root{
 --bg:var(--tg-theme-secondary-bg-color,#EFEEF3);
 --card:var(--tg-theme-bg-color,#FFFFFF);
 --ink:var(--tg-theme-text-color,#0B0B0C);
 --hint:var(--tg-theme-hint-color,#8A8E99);
 --line:#E6E4EA;--accent:#E5502A;--good:#2E8B57;--star:#F5A623;
 --safe-b:max(var(--tg-safe-area-inset-bottom,0px),env(safe-area-inset-bottom,0px));--tab:62px;--lift:12px;--r:16px;
}
@media (prefers-color-scheme:dark){:root{--bg:var(--tg-theme-secondary-bg-color,#16171B);
 --card:var(--tg-theme-bg-color,#222327);--ink:var(--tg-theme-text-color,#F4F4F6);
 --hint:var(--tg-theme-hint-color,#8A8E99);--line:#2C2D33;--accent:#F26B45;}}
:root[data-theme="light"]{--bg:#EFEEF3;--card:#fff;--ink:#0B0B0C;--hint:#8A8E99;--line:#E6E4EA;--accent:#E5502A;}
:root[data-theme="dark"]{--bg:#16171B;--card:#222327;--ink:#F4F4F6;--hint:#8A8E99;--line:#2C2D33;--accent:#F26B45;}

*{box-sizing:border-box}body{margin:0}
.wrap{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);display:flex;
 justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:440px;background:var(--bg);color:var(--ink);position:relative;
 display:flex;flex-direction:column;min-height:100vh}

.hdr{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;padding:13px 14px;
 background:var(--card);border-bottom:1px solid var(--line)}
.back{border:none;background:transparent;color:var(--accent);font-size:30px;line-height:1;width:28px;
 height:28px;cursor:pointer;display:none;padding:0;margin:-2px 0}
.back.show{display:block}
.htitle{font-weight:800;font-size:17px;letter-spacing:-.01em;flex:1;min-width:0}
.hsub{font-weight:500;font-size:12px;color:var(--hint);display:block;margin-top:1px}
.hpill{border:1px solid var(--line);background:var(--bg);color:var(--ink);font:inherit;font-weight:600;
 font-size:12.5px;padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}

.screen{flex:1;overflow-y:auto;padding-bottom:calc(150px + var(--safe-b))}

.banner{margin:14px 16px 4px;border-radius:var(--r);padding:16px 18px;color:#fff;
 background:linear-gradient(120deg,var(--accent),color-mix(in srgb,var(--accent) 68%,#000))}
.banner b{display:block;font-size:16px;font-weight:800;letter-spacing:-.01em}
.banner span{font-size:12.5px;opacity:.92}

.search{display:flex;align-items:center;gap:9px;margin:14px 16px 6px;background:var(--card);
 border:1px solid var(--line);border-radius:13px;padding:11px 14px}
.search svg{flex:none;opacity:.55}
.search input{border:none;background:transparent;color:var(--ink);font:inherit;font-size:15px;
 outline:none;width:100%}
.search .clr{border:none;background:transparent;color:var(--hint);font-size:19px;cursor:pointer;display:none}
.search .clr.show{display:block}

.cats{position:sticky;top:0;z-index:10;display:flex;gap:8px;overflow-x:auto;padding:10px 14px;
 background:var(--bg);scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:none;font:inherit;font-weight:600;font-size:13.5px;color:var(--ink);background:var(--card);
 border:1px solid var(--line);border-radius:999px;padding:8px 14px;cursor:pointer;
 transition:background .3s,color .3s,transform .5s cubic-bezier(.16,1,.3,1)}
.cat.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat:active{transform:scale(.95)}

.sec-title{font-weight:800;font-size:19px;letter-spacing:-.02em;padding:14px 16px 6px}
.found{font-size:13px;color:var(--hint);padding:6px 16px 2px}
.menu{display:flex;flex-direction:column}

.pcard{display:flex;align-items:center;gap:13px;padding:12px 16px;cursor:pointer;
 border-bottom:1px solid var(--line)}
.pcard:active{background:var(--card)}
.pimg{width:76px;height:76px;border-radius:14px;flex:none;background-size:cover;background-position:center;
 background-color:var(--line);box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
.pmeta{flex:1;min-width:0}
.pname{font-weight:700;font-size:15px;letter-spacing:-.01em}
.prate{font-size:12px;color:var(--hint);margin-top:2px;display:flex;gap:8px;align-items:center}
.prate .st{color:var(--star);font-weight:700}
.pdesc{font-size:12.5px;color:var(--hint);margin-top:3px;line-height:1.35;
 display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prow{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:10px}
.pprice{font-weight:800;font-size:15px}
.padd{flex:none;width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);
 color:var(--accent);font-size:22px;font-weight:600;cursor:pointer;display:grid;place-items:center;
 transition:transform .5s cubic-bezier(.16,1,.3,1)}
.padd:active{transform:scale(.9)}.padd.in{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{text-align:center;color:var(--hint);padding:60px 24px;font-size:14.5px}
.empty .big{font-size:52px;margin-bottom:12px}

.stepper{display:flex;align-items:center;background:var(--card);border:1px solid var(--line);
 border-radius:11px;overflow:hidden;flex:none}
.stepper button{width:34px;height:38px;border:none;background:transparent;color:var(--accent);
 font-size:20px;font-weight:600;cursor:pointer}
.stepper .q{min-width:26px;text-align:center;font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}

.hero{height:230px;background-size:cover;background-position:center;background-color:var(--line)}
.body{padding:18px 16px}
.body h2{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px}
.body .desc{color:var(--hint);font-size:14px;line-height:1.5;margin-bottom:6px}
.opt-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--hint);margin:18px 0 10px}
.opt{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;background:var(--card);
 border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.opt.sel{border-color:var(--accent)}
.opt .lbl{font-weight:600;font-size:14.5px}
.opt .rt{display:flex;align-items:center;gap:10px;color:var(--hint);font-size:14px;font-weight:600}
.radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:none;position:relative}
.opt.sel .radio{border-color:var(--accent)}
.opt.sel .radio::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:none;position:relative}
.opt.sel .chk{background:var(--accent);border-color:var(--accent)}
.opt.sel .chk::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:800}

.list{padding:6px 0}
.li{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.li-img{width:52px;height:52px;border-radius:11px;flex:none;background-size:cover;background-position:center;background-color:var(--line)}
.li-meta{flex:1;min-width:0}.li-name{font-weight:700;font-size:14.5px}
.li-sub{font-size:12px;color:var(--hint);margin-top:2px}.li-price{font-weight:800;font-size:14px;margin-top:4px}
.group{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin:14px 16px}
.field{display:flex;flex-direction:column;gap:5px;padding:13px 15px;border-bottom:1px solid var(--line)}
.field:last-child{border-bottom:none}
.field label{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--hint)}
.field input{border:none;background:transparent;color:var(--ink);font:inherit;font-size:15px;font-weight:500;outline:none;width:100%}
.toggle{display:flex;gap:8px;padding:14px 16px 4px}
.toggle button{flex:1;font:inherit;font-weight:600;font-size:13.5px;padding:11px;border-radius:12px;
 border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer}
.toggle button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pay{padding:0 16px}.pay .opt{margin-top:8px}
.totrow{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;font-size:14px}
.totrow .k{color:var(--hint)}.totrow .v{font-weight:600;font-variant-numeric:tabular-nums}
.totrow.big .k{color:var(--ink);font-weight:700}.totrow.big .v{font-weight:800;font-size:17px}

/* login / otp */
.auth{padding:26px 22px}
.auth .ic{width:70px;height:70px;border-radius:20px;background:color-mix(in srgb,var(--accent) 14%,transparent);
 color:var(--accent);display:grid;place-items:center;font-size:34px;margin-bottom:20px}
.auth h2{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:0 0 8px}
.auth p{color:var(--hint);font-size:14.5px;line-height:1.5;margin:0 0 24px}
.phone-in{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);
 border-radius:14px;padding:15px 16px;font-size:19px;font-weight:700;letter-spacing:.02em}
.phone-in:focus-within{border-color:var(--accent)}
.phone-in .cc{color:var(--hint)}
.phone-in input{border:none;background:transparent;color:var(--ink);font:inherit;font-size:19px;font-weight:700;
 outline:none;width:100%;letter-spacing:.04em}
.otp{display:flex;gap:12px;margin-top:4px}
.otp input{flex:1;min-width:0;width:100%;height:64px;text-align:center;font-size:28px;font-weight:800;border:1.5px solid var(--line);
 border-radius:14px;background:var(--card);color:var(--ink);outline:none}
.otp input:focus{border-color:var(--accent)}
.resend{margin-top:20px;font-size:13.5px;color:var(--hint)}.resend b{color:var(--accent)}
.consent{margin-top:16px;font-size:11.5px;color:var(--hint);line-height:1.45}

/* profile */
.prof-head{display:flex;align-items:center;gap:14px;padding:20px 18px}
.prof-av{width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;display:grid;
 place-items:center;font-size:24px;font-weight:800;flex:none}
.prof-name{font-weight:800;font-size:18px}.prof-phone{color:var(--hint);font-size:13.5px;margin-top:2px}
.bonus{margin:6px 16px 14px;border-radius:var(--r);padding:16px 18px;color:#fff;
 background:linear-gradient(120deg,#8B5CF6,#6D28D9);display:flex;justify-content:space-between;align-items:center}
.bonus .b-num{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums}
.bonus .b-lab{font-size:12px;opacity:.9}
.rows{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin:0 16px}
.prow2{display:flex;align-items:center;gap:12px;padding:15px;border-bottom:1px solid var(--line);cursor:pointer;font-weight:600;font-size:14.5px}
.prow2:last-child{border-bottom:none}.prow2 .ar{margin-left:auto;color:var(--hint)}
.prow2 .em{font-size:19px}
.logout{color:#E5502A}

/* success */
.done{padding:40px 24px;text-align:center}
.done .ok{width:84px;height:84px;border-radius:50%;background:color-mix(in srgb,var(--good) 16%,transparent);
 color:var(--good);display:grid;place-items:center;font-size:42px;margin:0 auto 20px;animation:pop .6s cubic-bezier(.16,1,.3,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:none;opacity:1}}
.done h2{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 8px}
.done p{color:var(--hint);font-size:14.5px;line-height:1.5;max-width:30ch;margin:0 auto 6px}
.done .synced{display:inline-flex;gap:7px;align-items:center;margin-top:16px;font-size:13px;font-weight:600;
 color:var(--good);background:color-mix(in srgb,var(--good) 12%,transparent);padding:8px 14px;border-radius:999px}

/* MainButton */
.mainbtn{position:fixed;left:0;right:0;bottom:calc(var(--tabh,74px) + 6px);z-index:30;margin:0 auto;
 max-width:440px;padding:10px 12px;background:var(--card);border-top:1px solid var(--line);
 transform:translateY(calc(100% + var(--tabh,74px) + 30px));transition:transform .5s cubic-bezier(.16,1,.3,1),bottom .4s cubic-bezier(.16,1,.3,1);pointer-events:none}
.mainbtn.show{transform:none;pointer-events:auto}
.app.modal .mainbtn{bottom:calc(var(--safe-b) + var(--lift))}
.mb-btn{width:100%;height:52px;border:none;border-radius:13px;background:var(--accent);color:#fff;font:inherit;
 font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
 transition:transform .5s cubic-bezier(.16,1,.3,1)}
.mb-btn:disabled{opacity:.5}
.mb-btn:active{transform:scale(.985)}
.mb-btn .badge{background:rgba(255,255,255,.25);border-radius:999px;padding:2px 9px;font-size:13px;font-variant-numeric:tabular-nums}
.mb-btn .amt{margin-left:auto;font-variant-numeric:tabular-nums}

/* tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:25;margin:0 auto;max-width:440px;display:flex;
 background:var(--card);border-top:1px solid var(--line);padding-bottom:calc(var(--safe-b) + var(--lift));padding-top:4px;
 transition:transform .5s cubic-bezier(.16,1,.3,1)}
.app.modal .tabbar{transform:translateY(120%)}
.tab{flex:1;border:none;background:transparent;color:var(--hint);font:inherit;font-weight:600;font-size:11px;
 padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.tab .ico{font-size:21px;line-height:1}
.tab.on{color:var(--accent)}
.tab .tbadge{position:absolute;top:4px;left:calc(50% + 6px);background:var(--accent);color:#fff;font-size:10px;
 font-weight:800;min-width:16px;height:16px;border-radius:999px;display:none;align-items:center;justify-content:center;padding:0 4px}
.tab .tbadge.show{display:flex}

.theme-fab{position:fixed;top:11px;right:calc(50% - 220px + 12px);z-index:40;width:32px;height:32px;border-radius:50%;
 border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-size:14px;display:grid;place-items:center}
@media(max-width:464px){.theme-fab{right:12px}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.001s!important}}
</style>

<main class="wrap">
 <div class="app" id="app">
  <header class="hdr">
   <button class="back" id="back" aria-label="Назад">‹</button>
   <div class="htitle" id="htitle">🔥 Дровница<span class="hsub">Доставка · ~40 мин</span></div>
   <button class="hpill" id="hpill">Красноярск</button>

  <section class="screen" id="screen"></section>
  <div class="mainbtn" id="mainbtn"><button class="mb-btn" id="mbbtn"><span class="mb-label">Далее</span></button></div>

   <button class="tab on" data-tab="menu"><span class="ico">🍽️</span>Меню</button>

  </nav>
 </div>

</main>

   var h='<div class="hero" style="'+bg(m.img)+'"></div><div class="body"><h2>'+m.n+'</h2>'+
    '<div class="prate" style="margin-bottom:10px"><span class="st">★ '+m.rt.toFixed(1)+'</span><span>'+m.w+'</span></div>'+
    '<div class="desc">'+m.d+'</div>';
   if(m.sizes){h+='<div class="opt-title">Размер</div>'+
    '<div class="opt'+(size===1?' sel':'')+'" data-sz="1"><span class="lbl">Средняя · 25 см</span><span class="rt"><span class="radio"></span></span></div>'+
    '<div class="opt'+(size===2?' sel':'')+'" data-sz="2"><span class="lbl">Большая · 35 см</span><span class="rt">+150 ₽<span class="radio"></span></span></div>'+
    '<div class="opt-title">Добавить</div>';
    EXTRAS.forEach(function(e){h+='<div class="opt'+(extras[e[0]]?' sel':'')+'" data-ex="'+e[0]+'"><span class="lbl">'+e[1]+'</span><span class="rt">+'+e[2]+' ₽<span class="chk"></span></span></div>';});}
   h+='</div>';screen.innerHTML=h;
   screen.querySelectorAll('[data-sz]').forEach(function(o){o.onclick=function(){haptic('sel');size=+o.getAttribute('data-sz');draw();};});
   screen.querySelectorAll('[data-ex]').forEach(function(o){o.onclick=function(){haptic('sel');var k=o.getAttribute('data-ex');extras[k]=!extras[k];draw();};});
   MB('Добавить в корзину',null,unit(),function(){
    var meta=[];if(m.sizes)meta.push(size===2?'большая':'средняя');
    EXTRAS.forEach(function(e){if(extras[e[0]])meta.push(e[1].toLowerCase());});
    addLine(id,m.n,m.img,unit(),meta.join(', '),1);haptic('ok');back();});
  }
  draw();
 }
 function addLine(pid,name,img,unit,meta,q){var key=pid+'|'+unit+'|'+(meta||'');
  var ex=cart.filter(function(l){return l.key===key;})[0];
  if(ex)ex.q+=q;else cart.push({key:key,pid:pid,name:name,img:img,unit:unit,meta:meta,q:q});syncBadge();}

 /* ---------- CART ---------- */
 function cartScreen(){
  htitle.innerHTML='Корзина';hpill.style.display='none';
  if(!cart.length){screen.innerHTML='<div class="empty"><div class="big">🛒</div>Корзина пуста.<br>Загляните в меню — там вкусно!</div>';MBhide();return;}
  var h='<div class="list">';
  cart.forEach(function(l,idx){h+='<div class="li"><div class="li-img" style="'+bg(l.img)+'"></div>'+
   '<div class="li-meta"><div class="li-name">'+l.name+'</div>'+(l.meta?'<div class="li-sub">'+l.meta+'</div>':'')+
   '<div class="li-price">'+money(l.unit*l.q)+'</div></div>'+
   '<div class="stepper"><button data-dec="'+idx+'">−</button><span class="q">'+l.q+'</span><button data-inc="'+idx+'">+</button></div></div>';});
  h+='</div>';var sum=cartSum(),deliv=sum>=700?0:149;
  h+='<div style="height:6px"></div>'+
   '<div class="totrow"><span class="k">Товары</span><span class="v">'+money(sum)+'</span></div>'+
   '<div class="totrow"><span class="k">Доставка</span><span class="v">'+(deliv?money(deliv):'бесплатно')+'</span></div>'+
   '<div class="totrow big"><span class="k">Итого</span><span class="v">'+money(sum+deliv)+'</span></div>';
  screen.innerHTML=h;
  screen.querySelectorAll('[data-inc]').forEach(function(b){b.onclick=function(){haptic('light');cart[+b.getAttribute('data-inc')].q++;cartScreen();};});
  screen.querySelectorAll('[data-dec]').forEach(function(b){b.onclick=function(){haptic('light');var i=+b.getAttribute('data-dec');cart[i].q--;if(cart[i].q<=0)cart.splice(i,1);cartScreen();};});
  MB('Оформить заказ',null,sum+deliv,function(){if(!user){pendingCheckout=true;push(login);}else push(checkout);});
 }

 /* ---------- LOGIN (phone) ---------- */
 function login(){
  htitle.innerHTML='Вход';hpill.style.display='none';var digits='';
  screen.innerHTML='<div class="auth"><div class="ic">📱</div><h2>Вход по номеру</h2>'+
   '<p>Пришлём код подтверждения в SMS. Бонусы и история заказов привяжутся к номеру.</p>'+
   '<div class="phone-in"><span class="cc">+7</span><input id="ph" inputmode="numeric" maxlength="15" placeholder="(___) ___-__-__" autocomplete="tel"/></div>'+
   '<div class="consent">Нажимая «Получить код», вы соглашаетесь с условиями и политикой конфиденциальности.</div></div>';
  var inp=document.getElementById('ph');
  function fmt(d){var r='';if(d.length)r='('+d.slice(0,3);if(d.length>=4)r+=') '+d.slice(3,6);if(d.length>=7)r+='-'+d.slice(6,8);if(d.length>=9)r+='-'+d.slice(8,10);return r;}
  inp.addEventListener('input',function(){digits=this.value.replace(/\D/g,'').slice(0,10);this.value=fmt(digits);
   MB('Получить код',null,null,send,digits.length<10);});
  inp.focus();
  function send(){haptic('light');var full='+7 '+fmt(digits);push(function(){otp(full,digits);});}
  MB('Получить код',null,null,send,true);
 }
 function otp(full,digits){
  htitle.innerHTML='Код из SMS';hpill.style.display='none';
  screen.innerHTML='<div class="auth"><div class="ic">🔑</div><h2>Введите код</h2>'+
   '<p>Отправили 4-значный код на <b style="color:var(--ink)">'+full+'</b>. В демо подойдёт любой код — можно сразу нажать «Подтвердить».</p>'+
   '<div class="otp">'+[0,1,2,3].map(function(i){return '<input inputmode="numeric" maxlength="1" data-i="'+i+'"/>';}).join('')+'</div>'+
   '<div class="resend">Не пришёл код? <b>Отправить снова (0:59)</b></div></div>';
  var boxes=[].slice.call(screen.querySelectorAll('.otp input'));
  function check(){var code=boxes.map(function(b){return b.value;}).join('');
   MB('Подтвердить',null,null,function(){finishLogin(full,digits);},false);}
  boxes.forEach(function(b,i){b.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');
    if(this.value&&i<3)boxes[i+1].focus();haptic('sel');check();
    if(boxes.every(function(x){return x.value;})){setTimeout(function(){finishLogin(full,digits);},250);}});
   b.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&i>0)boxes[i-1].focus();});});
  boxes[0].focus();MB('Подтвердить',null,null,function(){finishLogin(full,digits);},false);
 }
 function finishLogin(full,digits){
  if(user)return;haptic('ok');
  user={phone:full,name:'Гость',bonus:150};
  modal=[];/* clear auth stack */
  if(pendingCheckout){pendingCheckout=false;tab='cart';modal=[checkout];}
  else{tab='profile';}
  renderTop();
 }

 /* ---------- PROFILE ---------- */
 function profileScreen(){
  htitle.innerHTML='Профиль';hpill.style.display='none';
  if(!user){screen.innerHTML='<div class="auth"><div class="ic">👤</div><h2>Вы не вошли</h2>'+
    '<p>Войдите по номеру телефона, чтобы копить бонусы, видеть историю заказов и оформлять быстрее.</p></div>';
   MB('Войти по телефону',null,null,function(){pendingCheckout=false;push(login);});return;}
  MBhide();
  var initials=user.phone.slice(-2);
  screen.innerHTML='<div class="prof-head"><div class="prof-av">👤</div>'+
    '<div><div class="prof-name">'+user.name+'</div><div class="prof-phone">'+user.phone+'</div></div></div>'+
   '<div class="bonus"><div><div class="b-num">'+user.bonus+' ₽</div><div class="b-lab">бонусов на счету</div></div><div style="font-size:30px">🎁</div></div>'+
   '<div class="rows">'+
    '<div class="prow2"><span class="em">🧾</span>История заказов<span class="ar">›</span></div>'+
    '<div class="prow2"><span class="em">📍</span>Мои адреса<span class="ar">›</span></div>'+
    '<div class="prow2"><span class="em">🔔</span>Уведомления<span class="ar">›</span></div>'+
    '<div class="prow2 logout" id="logout"><span class="em">🚪</span>Выйти</div>'+
   '</div>';
  document.getElementById('logout').onclick=function(){haptic('light');user=null;profileScreen();syncBadge();};
 }

 /* ---------- CHECKOUT ---------- */
 function checkout(){
  htitle.innerHTML='Оформление';hpill.style.display='none';
  var sum=cartSum(),deliv=(mode==='deliv'&&sum<700)?149:0,total=sum+deliv;
  var h='<div class="toggle"><button data-m="deliv" class="'+(mode==='deliv'?'on':'')+'">🛵 Доставка</button>'+
   '<button data-m="pickup" class="'+(mode==='pickup'?'on':'')+'">🏃 Самовывоз</button></div><div class="group">';
  h+=mode==='deliv'?'<div class="field"><label>Адрес доставки</label><input value="ул. Взлётная, 30, кв. 12"/></div>'
    :'<div class="field"><label>Пункт самовывоза</label><input value="пр. Мира, 91 (готово к 18:40)" readonly/></div>';
  h+='<div class="field"><label>Телефон</label><input value="'+(user?user.phone:'+7 962 067-68-46')+'"/></div>'+
   '<div class="field"><label>Комментарий</label><input placeholder="Домофон, этаж, пожелания"/></div></div>';
  h+='<div class="opt-title" style="padding-left:16px">Оплата</div><div class="pay">'+
   payOpt('sbp','СБП · Система быстрых платежей')+payOpt('card','Банковской картой онлайн')+payOpt('cash','Наличными курьеру')+'</div>';
  h+='<div style="height:10px"></div>'+
   '<div class="totrow"><span class="k">Товары</span><span class="v">'+money(sum)+'</span></div>'+
   '<div class="totrow"><span class="k">Доставка</span><span class="v">'+(deliv?money(deliv):(mode==='pickup'?'—':'бесплатно'))+'</span></div>'+
   '<div class="totrow big"><span class="k">К оплате</span><span class="v">'+money(total)+'</span></div>';
  screen.innerHTML=h;
  screen.querySelectorAll('[data-m]').forEach(function(b){b.onclick=function(){haptic('sel');mode=b.getAttribute('data-m');checkout();};});
  screen.querySelectorAll('[data-p]').forEach(function(b){b.onclick=function(){haptic('sel');pay=b.getAttribute('data-p');checkout();};});
  var lbl=pay==='sbp'?'Оплатить по СБП':pay==='card'?'Оплатить картой':'Оформить (оплата курьеру)';
  MB(lbl,null,total,function(){haptic('ok');success(total);});
 }
 function payOpt(id,label){return '<div class="opt'+(pay===id?' sel':'')+'" data-p="'+id+'"><span class="lbl">'+label+'</span><span class="rt"><span class="radio"></span></span></div>';}

 /* ---------- SUCCESS ---------- */
 function success(total){
  var num=1000+Math.floor(Math.random()*900),bon=Math.round(total*0.05);
  if(user)user.bonus+=bon;
  cart=[];modal=[];tab='menu';fCat='all';fQuery='';
  htitle.innerHTML='Заказ оформлен';hpill.style.display='none';
  screen.innerHTML='<div class="done"><div class="ok">✓</div><h2>Заказ №'+num+' принят</h2>'+
   '<p>Оплачено '+money(total)+'. Уже готовим — '+(mode==='pickup'?'заберите к 18:40':'доставим ~40 минут')+'.</p>'+
   '<div class="synced">✓ Ушёл на кухню и в 1С</div>'+
   '<p style="margin-top:18px">🎁 Начислено '+bon+' '+plur(bon,['бонус','бонуса','бонусов'])+(user?' · баланс '+user.bonus+' ₽':'')+'</p></div>';
  app.classList.remove('modal');backBtn.classList.remove('show');syncBadge();if(tg){try{tg.BackButton.hide();}catch(e){}}
  MB('В меню',null,null,function(){MBhide();showTab('menu');});
 }

 var roots={menu:menuScreen,cart:cartScreen,profile:profileScreen};
 document.getElementById('theme').onclick=function(){var r=document.documentElement,c=r.getAttribute('data-theme');
  var dark=c?c==='dark':matchMedia('(prefers-color-scheme:dark)').matches;r.setAttribute('data-theme',dark?'light':'dark');};

 function setTabH(){var t=document.getElementById('tabbar');if(t)document.documentElement.style.setProperty('--tabh',t.offsetHeight+'px');}
 setTabH();window.addEventListener('resize',setTabH);
 renderTop();setTabH();
})();
</script>
